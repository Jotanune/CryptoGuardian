name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff mypy

      - name: Ruff linter (strict)
        run: ruff check src/ --select E,F,W,I,N,UP,B,SIM,TCH

      - name: Ruff formatter check
        run: ruff format --check src/

      - name: Mypy type checking (strict)
        run: mypy src/ --strict --python-version 3.12

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '.env.example' | python -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', {})
          if any(results.values()):
              print('⚠️  Potential secrets detected!')
              for f, secrets in results.items():
                  for s in secrets:
                      print(f'  {f}:{s[\"line_number\"]} — {s[\"type\"]}')
              sys.exit(1)
          print('✅ No secrets found')
          "

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cryptoguardian:test .

      - name: Verify non-root user
        run: |
          docker run --rm cryptoguardian:test whoami | grep -q cryptoguardian

      - name: Verify healthcheck endpoint exists
        run: |
          docker inspect cryptoguardian:test --format='{{.Config.Healthcheck}}' | grep -q "curl"
